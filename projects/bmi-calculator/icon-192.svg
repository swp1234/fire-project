<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009473;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="192" height="192" fill="#0f0f23"/>

  <!-- 내부 원형 배경 -->
  <circle cx="96" cy="96" r="90" fill="url(#grad1)" opacity="0.15"/>

  <!-- 게이지 배경 (반원) -->
  <circle cx="96" cy="110" r="55" fill="none" stroke="rgba(0, 184, 148, 0.3)" stroke-width="8"/>

  <!-- 게이지 색상 섹션 -->
  <path d="M 41 110 A 55 55 0 0 1 96 55" fill="none" stroke="#3498db" stroke-width="8" stroke-linecap="round"/>
  <path d="M 96 55 A 55 55 0 0 1 135 75" fill="none" stroke="#00b894" stroke-width="8" stroke-linecap="round"/>
  <path d="M 135 75 A 55 55 0 0 1 151 110" fill="none" stroke="#f39c12" stroke-width="8" stroke-linecap="round"/>
  <path d="M 151 110 A 55 55 0 0 1 96 145" fill="none" stroke="#e74c3c" stroke-width="8" stroke-linecap="round"/>

  <!-- 바늘 -->
  <line x1="96" y1="110" x2="96" y2="65" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="96" cy="110" r="5" fill="#fff"/>

  <!-- 중앙 숫자 (BMI) -->
  <text x="96" y="140" font-size="24" font-weight="700" text-anchor="middle" fill="#00b894">BMI</text>

  <!-- 상단 제목 -->
  <text x="96" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#fff">💪</text>

  <!-- 테두리 -->
  <circle cx="96" cy="96" r="90" fill="none" stroke="rgba(0, 184, 148, 0.4)" stroke-width="2"/>
</svg>
