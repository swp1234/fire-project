<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009473;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="#0f0f23"/>

  <!-- 배경 원형 그래디언트 -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" opacity="0.1"/>

  <!-- 메인 컨테이너 (원형 카드) -->
  <circle cx="256" cy="256" r="220" fill="rgba(0, 184, 148, 0.08)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(0, 184, 148, 0.3)" stroke-width="2"/>

  <!-- 게이지 배경 (큰 반원) -->
  <circle cx="256" cy="300" r="140" fill="none" stroke="rgba(0, 184, 148, 0.2)" stroke-width="16"/>

  <!-- 게이지 색상 섹션 -->
  <path d="M 116 300 A 140 140 0 0 1 256 160" fill="none" stroke="#3498db" stroke-width="16" stroke-linecap="round"/>
  <path d="M 256 160 A 140 140 0 0 1 360 185" fill="none" stroke="#00b894" stroke-width="16" stroke-linecap="round"/>
  <path d="M 360 185 A 140 140 0 0 1 396 300" fill="none" stroke="#f39c12" stroke-width="16" stroke-linecap="round"/>
  <path d="M 396 300 A 140 140 0 0 1 256 440" fill="none" stroke="#e74c3c" stroke-width="16" stroke-linecap="round"/>

  <!-- 바늘 -->
  <g filter="url(#shadow)">
    <line x1="256" y1="300" x2="256" y2="185" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="256" cy="300" r="10" fill="#fff"/>
  </g>

  <!-- 중앙 정보 박스 -->
  <g>
    <!-- 배경 -->
    <rect x="156" y="340" width="200" height="100" rx="16" fill="rgba(0, 184, 148, 0.15)" stroke="rgba(0, 184, 148, 0.3)" stroke-width="2"/>

    <!-- BMI 숫자 -->
    <text x="256" y="385" font-size="56" font-weight="700" text-anchor="middle" fill="#00b894">24.5</text>

    <!-- BMI 레이블 -->
    <text x="256" y="415" font-size="16" text-anchor="middle" fill="rgba(255, 255, 255, 0.7)">정상 체중</text>
  </g>

  <!-- 상단 제목 -->
  <text x="256" y="80" font-size="48" font-weight="700" text-anchor="middle" fill="#fff">💪</text>

  <!-- 앱 이름 -->
  <text x="256" y="120" font-size="32" font-weight="700" text-anchor="middle" fill="#00b894">BMI 계산기</text>

  <!-- 장식 원 (모서리) -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="rgba(0, 184, 148, 0.2)" stroke-width="2"/>
  <circle cx="412" cy="412" r="30" fill="none" stroke="rgba(0, 184, 148, 0.2)" stroke-width="2"/>

  <!-- 테두리 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(0, 184, 148, 0.4)" stroke-width="3"/>
</svg>
