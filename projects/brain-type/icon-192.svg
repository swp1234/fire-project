<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#1a1a2e"/>

  <!-- Gradient defs -->
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff69f8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff69f8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#e040fb;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Glow circle -->
  <circle cx="96" cy="96" r="85" fill="url(#glowGradient)"/>

  <!-- Brain icon -->
  <g transform="translate(96, 96)">
    <!-- Left hemisphere -->
    <path d="M -30 -20 Q -35 -10 -35 5 Q -35 20 -25 28 Q -15 30 -5 25 Q -10 15 -10 0 Q -10 -15 -20 -25 Z"
          fill="url(#brainGradient)" stroke="#ff69f8" stroke-width="2"/>

    <!-- Right hemisphere -->
    <path d="M 30 -20 Q 35 -10 35 5 Q 35 20 25 28 Q 15 30 5 25 Q 10 15 10 0 Q 10 -15 20 -25 Z"
          fill="url(#brainGradient)" stroke="#ff69f8" stroke-width="2"/>

    <!-- Center connection -->
    <rect x="-8" y="-5" width="16" height="35" fill="url(#brainGradient)" stroke="#ff69f8" stroke-width="2" rx="4"/>

    <!-- Brain folds detail -->
    <path d="M -25 0 Q -20 5 -15 0 Q -10 5 -5 0"
          stroke="#ff69f8" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M 25 0 Q 20 5 15 0 Q 10 5 5 0"
          stroke="#ff69f8" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Highlight circle -->
  <circle cx="96" cy="96" r="85" fill="none" stroke="#ff69f8" stroke-width="2" opacity="0.5"/>
</svg>
