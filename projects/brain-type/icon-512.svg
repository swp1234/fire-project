<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#1a1a2e"/>

  <!-- Gradient defs -->
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff69f8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff69f8;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#e040fb;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Glow circle -->
  <circle cx="256" cy="256" r="220" fill="url(#glowGradient)"/>

  <!-- Brain icon -->
  <g transform="translate(256, 256)">
    <!-- Left hemisphere -->
    <path d="M -80 -50 Q -95 -30 -95 10 Q -95 50 -60 70 Q -30 80 0 65 Q -25 45 -25 0 Q -25 -40 -55 -65 Z"
          fill="url(#brainGradient)" stroke="#ff69f8" stroke-width="5"/>

    <!-- Right hemisphere -->
    <path d="M 80 -50 Q 95 -30 95 10 Q 95 50 60 70 Q 30 80 0 65 Q 25 45 25 0 Q 25 -40 55 -65 Z"
          fill="url(#brainGradient)" stroke="#ff69f8" stroke-width="5"/>

    <!-- Center connection -->
    <rect x="-20" y="-15" width="40" height="90" fill="url(#brainGradient)" stroke="#ff69f8" stroke-width="5" rx="10"/>

    <!-- Brain folds detail left -->
    <path d="M -60 -10 Q -50 5 -40 -10 Q -30 5 -20 -10"
          stroke="#ff69f8" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M -60 10 Q -50 25 -40 10 Q -30 25 -20 10"
          stroke="#ff69f8" stroke-width="3" fill="none" opacity="0.7"/>

    <!-- Brain folds detail right -->
    <path d="M 60 -10 Q 50 5 40 -10 Q 30 5 20 -10"
          stroke="#ff69f8" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 60 10 Q 50 25 40 10 Q 30 25 20 10"
          stroke="#ff69f8" stroke-width="3" fill="none" opacity="0.7"/>

    <!-- Center folds -->
    <path d="M -5 0 L -5 40"
          stroke="#ff69f8" stroke-width="2" opacity="0.5"/>
    <path d="M 5 0 L 5 40"
          stroke="#ff69f8" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Highlight circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ff69f8" stroke-width="4" opacity="0.5"/>
</svg>
