<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snakeGradient512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3bd882;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0f0f23"/>

  <!-- Grid pattern -->
  <g stroke="rgba(46, 204, 113, 0.08)" stroke-width="2">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Snake body segments -->
  <!-- Head with glow -->
  <circle cx="256" cy="256" r="72" fill="url(#snakeGradient512)" filter="url(#glow512)"/>

  <!-- Body segments -->
  <circle cx="256" cy="128" r="58" fill="url(#snakeGradient512)" opacity="0.85" filter="url(#glow512)"/>
  <circle cx="256" cy="32" r="48" fill="url(#snakeGradient512)" opacity="0.65" filter="url(#glow512)"/>

  <circle cx="360" cy="128" r="58" fill="url(#snakeGradient512)" opacity="0.85" filter="url(#glow512)"/>
  <circle cx="440" cy="128" r="48" fill="url(#snakeGradient512)" opacity="0.65" filter="url(#glow512)"/>

  <!-- Eyes on head (larger) -->
  <circle cx="232" cy="240" r="8" fill="#fff"/>
  <circle cx="280" cy="240" r="8" fill="#fff"/>
  <circle cx="235" cy="240" r="4" fill="#000"/>
  <circle cx="283" cy="240" r="4" fill="#000"/>

  <!-- Mouth -->
  <path d="M 250 280 Q 256 290 262 280" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Apple/Food element (larger) -->
  <circle cx="128" cy="384" r="42" fill="#e74c3c" opacity="0.95" filter="url(#glow512)"/>
  <text x="128" y="405" font-size="64" text-anchor="middle" dominant-baseline="middle">🍎</text>

  <!-- Bonus star -->
  <circle cx="384" cy="384" r="38" fill="#f39c12" opacity="0.9" filter="url(#glow512)"/>
  <text x="384" y="403" font-size="56" text-anchor="middle" dominant-baseline="middle">⭐</text>
</svg>
