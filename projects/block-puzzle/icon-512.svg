<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0f0f23"/>

  <!-- Gradient Defs -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Grid Background -->
  <g opacity="0.1" stroke="#9b59b6" stroke-width="2">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- I Block (Cyan) -->
  <rect x="64" y="80" width="54" height="54" fill="#00d4ff" rx="6" filter="url(#glow)"/>
  <rect x="118" y="80" width="54" height="54" fill="#00d4ff" rx="6" filter="url(#glow)"/>

  <!-- O Block (Yellow) -->
  <rect x="172" y="80" width="54" height="54" fill="#ffff00" rx="6" filter="url(#glow)"/>
  <rect x="226" y="80" width="54" height="54" fill="#ffff00" rx="6" filter="url(#glow)"/>

  <!-- T Block (Magenta) -->
  <rect x="64" y="172" width="54" height="54" fill="#ff00ff" rx="6" filter="url(#glow)"/>
  <rect x="118" y="172" width="54" height="54" fill="#ff00ff" rx="6" filter="url(#glow)"/>
  <rect x="172" y="172" width="54" height="54" fill="#ff00ff" rx="6" filter="url(#glow)"/>

  <!-- S Block (Green) -->
  <rect x="226" y="172" width="54" height="54" fill="#00ff00" rx="6" filter="url(#glow)"/>
  <rect x="280" y="172" width="54" height="54" fill="#00ff00" rx="6" filter="url(#glow)"/>

  <!-- Z Block (Pink) -->
  <rect x="64" y="264" width="54" height="54" fill="#ff0080" rx="6" filter="url(#glow)"/>
  <rect x="118" y="264" width="54" height="54" fill="#ff0080" rx="6" filter="url(#glow)"/>

  <!-- J Block (Orange) -->
  <rect x="172" y="264" width="54" height="54" fill="#ff8000" rx="6" filter="url(#glow)"/>
  <rect x="226" y="264" width="54" height="54" fill="#ff8000" rx="6" filter="url(#glow)"/>

  <!-- L Block (Blue) -->
  <rect x="280" y="264" width="54" height="54" fill="#0080ff" rx="6" filter="url(#glow)"/>
  <rect x="334" y="264" width="54" height="54" fill="#0080ff" rx="6" filter="url(#glow)"/>

  <!-- Puzzle Piece Circle (Center) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.6"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#grad2)" stroke-width="5" opacity="0.8"/>

  <!-- Border -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="url(#grad1)" stroke-width="6" rx="52" opacity="0.8"/>
</svg>
